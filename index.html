<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lua Script Generator</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; padding: 20px; }
        textarea { width: 100%; height: 100px; margin: 10px 0; background: #222; color: #0f0; border: 1px solid #444; }
        button { padding: 10px 20px; cursor: pointer; background: #007bff; color: white; border: none; }
        pre { background: #000; padding: 15px; border-left: 5px solid #007bff; overflow-x: auto; }
    </style>
</head>
<body>

    <h1>Lua Script Generator</h1>
    <p>Describe qué quieres que haga tu script (ej: "Auto farm en Blox Fruits"):</p>
    
    <textarea id="userInput" placeholder="Ejemplo: Teletransportarme a la isla del nivel 10..."></textarea>
    <br>
    <button onclick="generateScript()">Generar Código</button>

    <h2>Resultado:</h2>
    <pre id="output">-- Tu código aparecerá aquí...</pre>

    <script>
        function generateScript() {
            const input = document.getElementById('userInput').value;
            const output = document.getElementById('output');
            
            // Aquí puedes expandir la lógica para que sea más compleja
            const baseCode = `-- Generated for Delta, Fluxus, Codex, Trigo, Evo\n\n`;
            const customLogic = `-- Comentario del usuario: ${input}\n\nprint("Ejecutando: ${input}")\n-- Inserta aquí tus funciones de API específicas`;
            
            output.innerText = baseCode + customLogic;
        }
    </script>
</body>
</html>
